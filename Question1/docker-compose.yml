services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
    volumes:
      - ./.qdrant:/qdrant/storage

  app:
    build:
      context: .
    env_file:
      - ../.env
    environment:
      QDRANT_URL: http://qdrant:6333
    command:
      - sh
      - -c
      - python scripts/wait_for_qdrant.py && granian --interface asgi --host 0.0.0.0 --port 8000 telco_agent.api.main:app
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  ingest:
    image: question1-app:latest
    env_file:
      - ../.env
    environment:
      QDRANT_URL: http://qdrant:6333
    command:
      - sh
      - -c
      - python scripts/wait_for_qdrant.py && python scripts/ingest.py
    depends_on:
      - qdrant
